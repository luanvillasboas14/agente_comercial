server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/supabase/ {
        proxy_pass ${SUPABASE_URL}/;
        proxy_ssl_server_name on;

        proxy_set_header Host fcwuhwedretyomtrbgzb.supabase.co;
        proxy_set_header Content-Type "application/json";
        proxy_set_header apikey "${SUPABASE_KEY}";
        proxy_set_header Authorization "Bearer ${SUPABASE_KEY}";

        proxy_set_header Origin "";
        proxy_set_header Referer "";
        proxy_set_header Cookie "";
        proxy_set_header Sec-Fetch-Dest "";
        proxy_set_header Sec-Fetch-Mode "";
        proxy_set_header Sec-Fetch-Site "";
        proxy_set_header Sec-Ch-Ua "";
        proxy_set_header Sec-Ch-Ua-Mobile "";
        proxy_set_header Sec-Ch-Ua-Platform "";
        proxy_set_header User-Agent "nginx-proxy";
    }

    gzip on;
    gzip_types text/plain text/html text/css application/json application/javascript text/xml;
}
