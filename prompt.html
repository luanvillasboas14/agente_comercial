<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Prompt — IA (export n8n)</title>
  <style>
    :root {
      --bg: #0f1419;
      --panel: #1a2332;
      --border: #2d3a4f;
      --text: #e7edf5;
      --muted: #8b9cb3;
      --accent: #3d9cf0;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
      min-height: 100vh;
    }
    header {
      padding: 1.25rem 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    h1 {
      margin: 0;
      font-size: 1.25rem;
      font-weight: 600;
    }
    .sub {
      margin: 0.35rem 0 0;
      font-size: 0.85rem;
      color: var(--muted);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      margin-top: 1rem;
    }
    input[type="search"] {
      flex: 1;
      min-width: 200px;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      font-size: 0.95rem;
    }
    .layout {
      display: grid;
      grid-template-columns: minmax(200px, 280px) 1fr;
      gap: 0;
      min-height: calc(100vh - 120px);
    }
    @media (max-width: 768px) {
      .layout { grid-template-columns: 1fr; }
      nav { border-right: none; border-bottom: 1px solid var(--border); max-height: 40vh; overflow-y: auto; }
    }
    nav {
      border-right: 1px solid var(--border);
      background: var(--panel);
      padding: 0.75rem 0;
      overflow-y: auto;
    }
    nav button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 0.6rem 1rem;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      font-size: 0.88rem;
      border-left: 3px solid transparent;
    }
    nav button:hover { background: rgba(61, 156, 240, 0.12); }
    nav button.active {
      border-left-color: var(--accent);
      background: rgba(61, 156, 240, 0.15);
    }
    nav .node-type { display: block; font-size: 0.72rem; color: var(--muted); margin-top: 0.15rem; }
    main {
      padding: 1.25rem 1.5rem 3rem;
      overflow-y: auto;
      max-height: calc(100vh - 140px);
    }
    article {
      display: none;
      max-width: 900px;
    }
    article.visible { display: block; }
    article h2 {
      margin: 0 0 0.5rem;
      font-size: 1.1rem;
      color: var(--accent);
    }
    .meta {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .tool-desc {
      background: rgba(61, 156, 240, 0.1);
      border-left: 3px solid var(--accent);
      padding: 0.75rem 1rem;
      margin-bottom: 1rem;
      font-size: 0.9rem;
    }
    pre.prompt-body {
      margin: 0;
      padding: 1rem 1.25rem;
      background: #121a24;
      border: 1px solid var(--border);
      border-radius: 10px;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.82rem;
      font-family: "Cascadia Code", "Consolas", monospace;
      line-height: 1.45;
    }
    .err {
      padding: 2rem;
      color: #f87171;
    }
    .hint {
      padding: 1.5rem;
      color: var(--muted);
      max-width: 560px;
    }
    code { font-size: 0.85em; }
  </style>
</head>
<body>
  <header>
    <h1>Prompts da IA</h1>
    <p class="sub">Conteúdo extraído de <code>APAGAR.txt</code> (export JSON do n8n). Use um servidor HTTP local se o arquivo não carregar ao abrir direto do disco.</p>
    <div class="toolbar">
      <input type="search" id="filter" placeholder="Filtrar por nome do node ou texto do prompt…" autocomplete="off" />
    </div>
  </header>
  <div class="layout">
    <nav id="nav"></nav>
    <main id="main"></main>
  </div>

  <script>
    function stripN8nExpr(s) {
      if (typeof s !== 'string') return '';
      let t = s.trim();
      if (t.startsWith('=') && !t.startsWith('={{')) t = t.slice(1).trim();
      return t;
    }

    function collectSystemMessages(params, out, depth = 0) {
      if (!params || typeof params !== 'object' || depth > 12) return;
      if (Array.isArray(params)) {
        params.forEach((x) => collectSystemMessages(x, out, depth + 1));
        return;
      }
      for (const [k, v] of Object.entries(params)) {
        if (k === 'systemMessage' && typeof v === 'string' && v.trim().length > 40) {
          out.push(stripN8nExpr(v));
        } else if (v && typeof v === 'object') {
          collectSystemMessages(v, out, depth + 1);
        }
      }
    }

    function buildSections(data) {
      const sections = [];
      const nodes = data.nodes || [];
      for (const node of nodes) {
        const texts = [];
        collectSystemMessages(node.parameters || {}, texts);
        const uniq = [...new Set(texts)];
        if (uniq.length === 0) continue;
        const p = node.parameters || {};
        let toolDesc = '';
        if (typeof p.toolDescription === 'string' && p.toolDescription.trim())
          toolDesc = p.toolDescription.trim();
        else if (typeof p.description === 'string' && p.description.length < 500)
          toolDesc = p.description;
        for (let i = 0; i < uniq.length; i++) {
          sections.push({
            id: `${node.id || node.name || 'n'}-${i}`,
            name: node.name || 'Sem nome',
            type: node.type || '',
            toolDesc: i === 0 ? toolDesc : '',
            body: uniq[i],
          });
        }
      }
      return sections;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    let allSections = [];

    function render(filter) {
      const q = (filter || '').trim().toLowerCase();
      const nav = document.getElementById('nav');
      const main = document.getElementById('main');
      nav.innerHTML = '';
      main.innerHTML = '';

      const filtered = q
        ? allSections.filter(
            (s) =>
              s.name.toLowerCase().includes(q) ||
              s.type.toLowerCase().includes(q) ||
              s.body.toLowerCase().includes(q)
          )
        : allSections;

      if (filtered.length === 0) {
        main.innerHTML = '<p class="err">Nenhum prompt encontrado.</p>';
        return;
      }

      filtered.forEach((s, idx) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.innerHTML = `<span>${esc(s.name)}</span><span class="node-type">${esc(s.type.split('.').pop() || s.type)}</span>`;
        btn.addEventListener('click', () => {
          nav.querySelectorAll('button').forEach((b) => b.classList.remove('active'));
          btn.classList.add('active');
          main.querySelectorAll('article').forEach((a) => a.classList.remove('visible'));
          const art = document.getElementById('art-' + s.id);
          if (art) art.classList.add('visible');
        });
        nav.appendChild(btn);
      });

      filtered.forEach((s) => {
        const art = document.createElement('article');
        art.id = 'art-' + s.id;
        art.className = 'visible';
        let html = `<h2>${esc(s.name)}</h2><div class="meta">${esc(s.type)}</div>`;
        if (s.toolDesc) html += `<div class="tool-desc"><strong>Descrição da tool:</strong> ${esc(s.toolDesc)}</div>`;
        html += `<pre class="prompt-body">${esc(s.body)}</pre>`;
        art.innerHTML = html;
        main.appendChild(art);
      });

      const firstBtn = nav.querySelector('button');
      const firstArt = main.querySelector('article');
      if (firstBtn && firstArt) {
        nav.querySelectorAll('button').forEach((b) => b.classList.remove('active'));
        main.querySelectorAll('article').forEach((a) => a.classList.remove('visible'));
        firstBtn.classList.add('active');
        firstArt.classList.add('visible');
      }
    }

    document.getElementById('filter').addEventListener('input', (e) => render(e.target.value));

    fetch('APAGAR.txt')
      .then((r) => {
        if (!r.ok) throw new Error('Não foi possível ler APAGAR.txt (status ' + r.status + ').');
        return r.text();
      })
      .then((txt) => {
        const data = JSON.parse(txt);
        allSections = buildSections(data);
        if (allSections.length === 0) {
          document.getElementById('main').innerHTML =
            '<p class="err">Nenhum campo systemMessage encontrado no JSON.</p>';
          return;
        }
        render('');
      })
      .catch((e) => {
        document.getElementById('nav').innerHTML = '';
        document.getElementById('main').innerHTML =
          '<div class="hint"><p><strong>Não deu para carregar APAGAR.txt automaticamente.</strong></p>' +
          '<p>Isso costuma acontecer ao abrir o HTML direto do disco (protocolo <code>file://</code>).</p>' +
          '<p>Suba a pasta em qualquer servidor estático, por exemplo na pasta do projeto:</p>' +
          '<pre style="background:#121a24;padding:1rem;border-radius:8px;overflow:auto">python -m http.server 8080</pre>' +
          '<p>Depois abra <code>http://localhost:8080/prompt.html</code></p>' +
          '<p style="color:#f87171;margin-top:1rem">' + esc(String(e.message || e)) + '</p></div>';
      });
  </script>
</body>
</html>
